services:
  postgres:
    image: postgres:16-alpine
    container_name: expctrl-postgres
    environment:
      POSTGRES_USER: expctrl
      POSTGRES_PASSWORD: expctrl
      POSTGRES_DB: expctrl
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations/000001_init_schema.up.sql:/docker-entrypoint-initdb.d/001_init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expctrl"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
